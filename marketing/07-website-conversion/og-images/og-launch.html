<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG · $EDGE Launch · 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050507; --void-2: #0C0C10;
    --lime: #C4FF00; --magenta: #FF006E; --green: #00FF85;
    --white: #F5F5F0; --muted: #6B6B73;
    --border: rgba(245,245,240,0.08); --border-bright: rgba(196,255,0,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background:
    linear-gradient(45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a1f 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a1f 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #0a0a0e;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--white); font-variant-numeric: tabular-nums;
  }
  .og {
    width: 1200px; height: 630px;
    background: var(--void);
    position: relative; overflow: hidden;
    display: grid; grid-template-rows: 64px 1fr;
  }
  .og::before { content: ''; position: absolute; top: 64px; left: 0; right: 0; height: 3px; background: var(--lime); z-index: 4; }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: .04; z-index: 5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
  }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 0 36px; border-bottom: 1px solid var(--border-bright); }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { width: 28px; height: 28px; }
  .brand .name { font-family: 'Anton', sans-serif; font-size: 24px; letter-spacing: -.02em; }
  .brand .name span { color: var(--lime); }
  .crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--muted); }
  .crumbs b { color: var(--lime); }

  .body { padding: 56px 56px 36px; display: flex; flex-direction: column; justify-content: center; gap: 22px; position: relative; }

  .live-pill { display: inline-flex; align-items: center; gap: 10px; padding: 10px 16px; border: 1px solid var(--lime); background: rgba(196,255,0,0.08); font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .3em; text-transform: uppercase; color: var(--lime); width: fit-content; }
  .live-pill .dot { width: 9px; height: 9px; background: var(--lime); border-radius: 999px; }

  h1 { font-family: 'Anton', sans-serif; font-size: 168px; line-height: .88; letter-spacing: -.02em; text-transform: uppercase; }
  h1 .accent { color: var(--lime); }
  h1 .slash { color: var(--muted); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 4px; }
  .stat { background: var(--void-2); padding: 14px 18px; display: flex; flex-direction: column; gap: 4px; }
  .stat .k { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .25em; color: var(--muted); text-transform: uppercase; }
  .stat .v { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
  .stat .v.green { color: var(--green); }
  .stat .v.lime { color: var(--lime); }

  .contract { display: flex; align-items: stretch; border: 1px solid var(--border-bright); }
  .contract .lbl { padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .25em; text-transform: uppercase; color: var(--muted); border-right: 1px solid var(--border); display: flex; align-items: center; }
  .contract .addr { flex: 1; padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--white); display: flex; align-items: center; }
  .contract .cta { padding: 0 28px; background: var(--lime); color: var(--void); font-family: 'Anton', sans-serif; font-size: 18px; letter-spacing: .04em; text-transform: uppercase; display: flex; align-items: center; }
</style>
</head>
<body>
<div class="og">
  <div class="grain"></div>
  <div class="top">
    <div class="brand">
      <svg viewBox="0 0 64 64"><path d="M20 10 L50 32 L20 54" fill="none" stroke="#C4FF00" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/></svg>
      <span class="name">$<span>EDGE</span></span>
    </div>
    <div class="crumbs">05 · <b>LIVE ON SOLANA</b></div>
  </div>

  <div class="body">
    <div class="live-pill"><span class="dot"></span>LIVE NOW · PUMP.FUN</div>
    <h1>$<span class="accent">EDGE</span> <span class="slash">/</span><br>IS <span class="accent">LIVE.</span></h1>
    <div class="stats">
      <div class="stat"><div class="k">PRICE</div><div class="v green">$0.0042</div></div>
      <div class="stat"><div class="k">MCAP</div><div class="v">$4.2M</div></div>
      <div class="stat"><div class="k">24H VOL</div><div class="v lime">$1.84M</div></div>
      <div class="stat"><div class="k">HOLDERS</div><div class="v">1,847</div></div>
    </div>
    <div class="contract">
      <div class="lbl">SPL · CA</div>
      <div class="addr">EdgE7r7TmnL2yQ3vK8sN9mPxR4dHfXcZbA1gJk6uW5vt</div>
      <div class="cta">BUY ON PUMP.FUN →</div>
    </div>
  </div>
</div>
</body>
</html>
