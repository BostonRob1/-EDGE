<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG · $EDGE Press · 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050507; --void-2: #0C0C10;
    --lime: #C4FF00; --magenta: #FF006E;
    --white: #F5F5F0; --muted: #6B6B73;
    --border: rgba(245,245,240,0.08); --border-bright: rgba(196,255,0,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background:
    linear-gradient(45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a1f 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a1f 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #0a0a0e;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--white); font-variant-numeric: tabular-nums;
  }
  .og {
    width: 1200px; height: 630px;
    background: var(--void);
    position: relative; overflow: hidden;
    display: grid; grid-template-rows: 64px 1fr;
  }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: .04; z-index: 5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
  }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 0 36px; border-bottom: 1px solid var(--border-bright); }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { width: 28px; height: 28px; }
  .brand .name { font-family: 'Anton', sans-serif; font-size: 24px; letter-spacing: -.02em; }
  .brand .name span { color: var(--lime); }
  .crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--muted); }
  .crumbs b { color: var(--lime); }

  .body { padding: 48px 56px; display: flex; flex-direction: column; justify-content: space-between; gap: 24px; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .3em; text-transform: uppercase; color: var(--lime); }
  h1 { font-family: 'Anton', sans-serif; font-size: 160px; line-height: .86; letter-spacing: -.02em; text-transform: uppercase; }
  h1 .accent { color: var(--lime); }
  h1 .slash { color: var(--muted); }

  .contact-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .c-cell { background: var(--void-2); padding: 18px 22px; display: flex; flex-direction: column; gap: 4px; }
  .c-cell .k { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .28em; color: var(--muted); text-transform: uppercase; }
  .c-cell .v { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--lime); font-weight: 500; }
</style>
</head>
<body>
<div class="og">
  <div class="grain"></div>
  <div class="top">
    <div class="brand">
      <svg viewBox="0 0 64 64"><path d="M20 10 L50 32 L20 54" fill="none" stroke="#C4FF00" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/></svg>
      <span class="name">$<span>EDGE</span></span>
    </div>
    <div class="crumbs">07 · <b>PRESS / MEDIA</b></div>
  </div>

  <div class="body">
    <div>
      <div class="eyebrow" style="margin-bottom:18px;">Press · Media · Partnerships · Inquiries</div>
      <h1>Media <span class="slash">/</span> Press<br><span class="slash">/</span> <span class="accent">Partners.</span></h1>
    </div>
    <div class="contact-grid">
      <div class="c-cell"><div class="k">PRESS</div><div class="v">cashbridgehomes@gmail.com</div></div>
      <div class="c-cell"><div class="k">PARTNERSHIPS</div><div class="v">cashbridgehomes@gmail.com</div></div>
      <div class="c-cell"><div class="k">GENERAL</div><div class="v">cashbridgehomes@gmail.com</div></div>
    </div>
  </div>
</div>
</body>
</html>
