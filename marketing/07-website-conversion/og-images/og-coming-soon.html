<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG · $EDGE Coming Soon · 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050507; --void-2: #0C0C10;
    --lime: #C4FF00; --magenta: #FF006E;
    --white: #F5F5F0; --muted: #6B6B73;
    --border: rgba(245,245,240,0.08); --border-bright: rgba(196,255,0,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background:
    linear-gradient(45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a1f 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a1f 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #0a0a0e;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--white); font-variant-numeric: tabular-nums;
  }
  .og {
    width: 1200px; height: 630px;
    background: var(--void);
    position: relative; overflow: hidden;
    display: grid; grid-template-rows: 64px 1fr;
  }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: .04; z-index: 5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
  }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 0 36px; border-bottom: 1px solid var(--border-bright); }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { width: 28px; height: 28px; }
  .brand .name { font-family: 'Anton', sans-serif; font-size: 24px; letter-spacing: -.02em; }
  .brand .name span { color: var(--lime); }
  .crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--muted); }
  .crumbs b { color: var(--lime); }

  .body { padding: 48px 56px; display: flex; flex-direction: column; justify-content: space-between; gap: 24px; position: relative; }

  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .3em; text-transform: uppercase; color: var(--lime); width: fit-content; }
  .eyebrow .dot { width: 8px; height: 8px; background: var(--lime); border-radius: 999px; }

  h1 { font-family: 'Anton', sans-serif; font-size: 240px; line-height: .82; letter-spacing: -.03em; text-transform: uppercase; }
  h1 .accent { color: var(--lime); }
  h1 .slash { color: var(--muted); }

  .clock-row { display: flex; gap: 0; border: 1px solid var(--border-bright); width: fit-content; }
  .clock-cell { padding: 18px 28px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 130px; }
  .clock-cell:last-child { border-right: 0; }
  .clock-cell .v { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; color: var(--lime); line-height: 1; letter-spacing: -.02em; }
  .clock-cell .k { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .3em; color: var(--muted); text-transform: uppercase; }

  .foot { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; }
  .foot .tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .25em; text-transform: uppercase; color: var(--muted); }
  .foot .tag b { color: var(--white); }
  .foot .url { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .2em; text-transform: uppercase; color: var(--lime); }
</style>
</head>
<body>
<div class="og">
  <div class="grain"></div>
  <div class="top">
    <div class="brand">
      <svg viewBox="0 0 64 64"><path d="M20 10 L50 32 L20 54" fill="none" stroke="#C4FF00" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/></svg>
      <span class="name">$<span>EDGE</span></span>
    </div>
    <div class="crumbs">06 · <b>PRE-LAUNCH</b></div>
  </div>

  <div class="body">
    <div class="eyebrow"><span class="dot"></span>T-MINUS · FAIRLAUNCH</div>
    <h1>T-MINUS<br><span class="slash">/</span> <span class="accent">DROPS</span><br>JUN 09 · 09:00 ET.</h1>
    <div class="clock-row">
      <div class="clock-cell"><div class="v">14</div><div class="k">Days</div></div>
      <div class="clock-cell"><div class="v">00</div><div class="k">Hours</div></div>
      <div class="clock-cell"><div class="v">00</div><div class="k">Minutes</div></div>
      <div class="clock-cell"><div class="v">00</div><div class="k">Seconds</div></div>
    </div>
    <div class="foot">
      <div class="tag">JOIN <b>1,247 ON THE LIST</b></div>
      <div class="url">EDGETERMINAL.XYZ</div>
    </div>
  </div>
</div>
</body>
</html>
