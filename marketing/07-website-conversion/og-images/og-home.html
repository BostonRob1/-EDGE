<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OG · $EDGE Home · 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050507; --void-2: #0C0C10; --void-3: #141418;
    --lime: #C4FF00; --magenta: #FF006E; --green: #00FF85; --amber: #FFB800; --red: #FF3344;
    --white: #F5F5F0; --muted: #6B6B73;
    --border: rgba(245,245,240,0.08); --border-bright: rgba(196,255,0,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background:
    linear-gradient(45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a1f 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a1f 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a1f 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    background-color: #0a0a0e;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--white);
    font-variant-numeric: tabular-nums;
  }
  .og {
    width: 1200px; height: 630px;
    background: var(--void);
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-rows: 64px 1fr 88px;
  }
  .grain { position: absolute; inset: 0; pointer-events: none; opacity: .04; z-index: 5;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
  }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 0 36px; border-bottom: 1px solid var(--border-bright); }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { width: 28px; height: 28px; }
  .brand .name { font-family: 'Anton', sans-serif; font-size: 24px; letter-spacing: -.02em; }
  .brand .name span { color: var(--lime); }
  .crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--muted); }
  .crumbs b { color: var(--lime); }
  .body { padding: 56px 56px 36px; display: flex; flex-direction: column; justify-content: center; gap: 28px; position: relative; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: .3em; text-transform: uppercase; color: var(--lime); }
  h1 { font-family: 'Anton', sans-serif; font-size: 112px; line-height: .88; letter-spacing: -.02em; text-transform: uppercase; max-width: 980px; }
  h1 .accent { color: var(--lime); }
  .meta { display: flex; gap: 32px; font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); }
  .meta b { color: var(--white); font-weight: 500; }

  /* ticker bottom */
  .ticker { border-top: 1px solid var(--border-bright); background: var(--void-2); display: flex; align-items: center; padding: 0 36px; overflow: hidden; gap: 36px; }
  .ticker .item { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: .12em; text-transform: uppercase; color: var(--white); display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
  .ticker .item .dot { width: 6px; height: 6px; background: var(--lime); border-radius: 999px; }
  .ticker .item .v { color: var(--lime); font-weight: 700; }
  .ticker .item .v.neg { color: var(--red); }
  .ticker .item .v.pos { color: var(--green); }

  /* chart accent in body */
  .accent-chart { position: absolute; right: 56px; top: 70px; width: 380px; height: 220px; opacity: .6; }
  .accent-chart svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="og">
  <div class="grain"></div>

  <div class="top">
    <div class="brand">
      <svg viewBox="0 0 64 64"><path d="M20 10 L50 32 L20 54" fill="none" stroke="#C4FF00" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/></svg>
      <span class="name">$<span>EDGE</span></span>
    </div>
    <div class="crumbs">THE TERMINAL FOR <b>PREDICTION MARKETS</b></div>
  </div>

  <div class="body">
    <div class="eyebrow">Money · Mouth · Edge · in one screen</div>
    <h1>Watch the <span class="accent">action.</span><br>Before you <span class="accent">bet.</span></h1>
    <div class="meta">
      <span>POLYMARKET + KALSHI</span>
      <span>WHALES · <b>TRACKED</b></span>
      <span>DIVERGENCE · <b>LIVE</b></span>
    </div>

    <div class="accent-chart">
      <svg viewBox="0 0 380 220" preserveAspectRatio="none">
        <g stroke="rgba(245,245,240,0.06)" stroke-width="1">
          <line x1="0" y1="50" x2="380" y2="50"/>
          <line x1="0" y1="100" x2="380" y2="100"/>
          <line x1="0" y1="150" x2="380" y2="150"/>
        </g>
        <path d="M 0 140 L 60 124 L 120 110 L 180 96 L 240 80 L 300 64 L 380 40"
              fill="none" stroke="#C4FF00" stroke-width="2.5"/>
        <path d="M 0 170 L 60 164 L 120 152 L 180 140 L 240 130 L 300 120 L 380 100"
              fill="none" stroke="#F5F5F0" stroke-width="2" opacity=".7"/>
        <line x1="380" y1="40" x2="380" y2="100" stroke="#FF006E" stroke-width="1.5" stroke-dasharray="3,3"/>
        <circle cx="380" cy="40" r="4" fill="#C4FF00"/>
        <circle cx="380" cy="100" r="4" fill="#F5F5F0"/>
      </svg>
    </div>
  </div>

  <div class="ticker">
    <span class="item"><span class="dot"></span>TRUMP×FED · <span class="v">62.4%</span></span>
    <span class="item">CPI Q4 · <span class="v neg">34.0%</span></span>
    <span class="item">BTC $200K · <span class="v pos">28.4%</span></span>
    <span class="item">SCOTUS '26 · <span class="v">71.6%</span></span>
    <span class="item">ETH ETF · <span class="v pos">66.4%</span></span>
    <span class="item">DIVERGENCE · <span class="v">+4.3pp</span></span>
  </div>
</div>
</body>
</html>
