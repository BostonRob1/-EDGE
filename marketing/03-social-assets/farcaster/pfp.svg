    <circle cx="200" cy="200" r="178" fill="none" stroke="#C4FF00" stroke-width="1" opacity="0.12"/>
    <path d="M138 110 L268 200 L138 290" fill="none" stroke="#C4FF00" stroke-width="30" stroke-linecap="square" stroke-linejoin="miter"/>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#F5F5F0" letter-spacing="0.25em">
      <text x="200" y="350" text-anchor="middle" opacity="0.55">$EDGE</text>
    </g>
  </g>
