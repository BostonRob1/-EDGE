    <path d="M696 38 L756 80 L696 122" fill="none" stroke="#C4FF00" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <rect width="1128" height="191" fill="url(#vignette)"/>

  <rect x="0" y="172" width="1128" height="19" fill="#0C0C10"/>
  <line x1="0" y1="172" x2="1128" y2="172" stroke="rgba(196,255,0,0.2)"/>
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" fill="#6B6B73" letter-spacing="0.22em">
    <text x="16" y="186">POLYMARKET &#183; KALSHI &#183; WHALES &#183; SENTIMENT &#183; DIVERGENCE &#183; EDGE-TWO-PSI.VERCEL.APP</text>
  </g>
