<!doctype html>
<!--
  $EDGE — TEASER · DIVERGENCE
  ─────────────────────────────────────────────────────────────────
  CANVAS:        1080 × 1080 (square)
  RUNTIME:       9.0s loop (8s sequence + 1s pause)
  USE:           IG feed · X · LinkedIn · OG image fallback
  AUDIO:         None embedded — add ambient industrial in post
  SCREEN-RECORD INSTRUCTIONS:
    1. Open this file in Chrome.
    2. Resize the window so .stage is exactly 1080×1080 on a Retina display
       (or use Chrome DevTools device toolbar set to 1080×1080 @ 1x).
    3. Use macOS Screenshot (Cmd+Shift+5) → Record Selected Portion.
       Drag a 1080×1080 marquee over the stage.
    4. Record 1 full cycle (9.0s) plus 1s lead-in and lead-out.
    5. Trim in DaVinci Resolve / CapCut to 9.0s loop.
    6. Export H.264 / MP4 / 60fps / 1080×1080 / 16Mbps for social.
  ─────────────────────────────────────────────────────────────────
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>$EDGE — Teaser · Divergence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050507;
    --void-2: #0c0c10;
    --lime: #C4FF00;
    --magenta: #FF006E;
    --white: #F5F5F0;
    --muted: #6B6B73;
    --border: rgba(245, 245, 240, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; -webkit-font-smoothing: antialiased; }

  .stage {
    width: 1080px;
    height: 1080px;
    background: var(--void);
    position: relative;
    overflow: hidden;
    /* Keep crisp 1080×1080 — scale only for preview when smaller */
    transform-origin: center center;
  }
  /* preview scaling for small browsers */
  @media (max-width: 1180px) { .stage { transform: scale(calc((100vw - 80px) / 1080)); } }
  @media (max-height: 1180px) { .stage { transform: scale(calc((100vh - 80px) / 1080)); } }
  @media (max-width: 1180px) and (max-height: 1180px) { .stage { transform: scale(min(calc((100vw - 80px) / 1080), calc((100vh - 80px) / 1080))); } }

  /* ====================== GRAIN ====================== */
  .grain {
    position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 8;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
    background-size: 240px 240px;
    animation: grainIn 9s ease-out infinite;
    mix-blend-mode: screen;
  }
  @keyframes grainIn {
    0% { opacity: 0; }
    11% { opacity: 0.05; }
    90% { opacity: 0.05; }
    100% { opacity: 0; }
  }

  /* subtle dot grid */
  .dotgrid {
    position: absolute; inset: 0; pointer-events: none; z-index: 1; opacity: 0.4;
    background-image: radial-gradient(rgba(245,245,240,0.05) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* ====================== HUD ====================== */
  .hud-tl, .hud-tr, .hud-bl, .hud-br, .hud-badge {
    position: absolute; z-index: 9; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  }
  .hud-tl { top: 28px; left: 32px; }
  .hud-tr { top: 28px; right: 32px; color: var(--lime); }
  .hud-bl { bottom: 28px; left: 32px; }
  .hud-br { bottom: 28px; right: 32px; }
  .hud-tl::before, .hud-tr::before, .hud-bl::before, .hud-br::before {
    content: ''; display: inline-block; width: 6px; height: 6px; background: currentColor; margin-right: 8px; vertical-align: middle;
  }
  .hud-badge {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    padding: 6px 12px; border: 1px solid var(--border); font-size: 11px; color: var(--muted);
    background: rgba(5,5,7,.4); backdrop-filter: blur(6px);
  }

  /* ====================== WORDS ====================== */
  .word {
    position: absolute; font-family: 'Anton', sans-serif; font-size: 140px; letter-spacing: -0.02em; line-height: 1; text-transform: uppercase;
    overflow: hidden;
    z-index: 4;
  }
  .word .inner {
    display: inline-block;
    transform: translateY(110%);
  }

  .word.money { top: 120px; left: 80px; color: var(--lime); }
  .word.mouth { top: 120px; right: 80px; color: var(--white); text-align: right; }
  .word.money .inner { animation: wordIn 9s cubic-bezier(.2,.7,.1,1) infinite; animation-delay: 0s; }
  .word.mouth .inner { animation: wordIn 9s cubic-bezier(.2,.7,.1,1) infinite; animation-delay: 1s; }

  @keyframes wordIn {
    0%, 11.1% { transform: translateY(110%); }
    18%, 88% { transform: translateY(0); }
    96%, 100% { transform: translateY(-110%); }
  }
  .word.mouth .inner { animation-name: wordInMouth; }
  @keyframes wordInMouth {
    0%, 22.2% { transform: translateY(110%); }
    29%, 88% { transform: translateY(0); }
    96%, 100% { transform: translateY(-110%); }
  }

  /* sub-label under each word */
  .word .sub { display:block; font-family:'JetBrains Mono', monospace; font-size: 18px; letter-spacing: .25em; color: var(--muted); opacity: 0; margin-top: 4px; }
  .word.money .sub { animation: subIn 9s ease-out infinite; animation-delay: .8s; }
  .word.mouth .sub { animation: subIn 9s ease-out infinite; animation-delay: 1.8s; }
  @keyframes subIn { 0%, 20% { opacity: 0; } 30%, 80% { opacity: 1; } 88%, 100% { opacity: 0; } }

  /* ====================== CHARTS ====================== */
  .chart-area {
    position: absolute; top: 360px; left: 80px; right: 80px; height: 460px; z-index: 3;
  }
  .chart-area svg { width: 100%; height: 100%; overflow: visible; }

  /* axis baseline */
  .axis {
    stroke: rgba(245,245,240,.08);
    stroke-width: 1;
    opacity: 0;
    animation: axisIn 9s ease-out infinite;
    animation-delay: 2s;
  }
  @keyframes axisIn { 0%, 22.2% { opacity: 0; } 30%, 88% { opacity: 1; } 96%, 100% { opacity: 0; } }

  /* money line — up and to the right */
  .line-money {
    fill: none;
    stroke: var(--lime);
    stroke-width: 5;
    stroke-linecap: square;
    stroke-linejoin: miter;
    stroke-dasharray: 1100;
    stroke-dashoffset: 1100;
    animation: drawMoney 9s cubic-bezier(.4,0,.2,1) infinite;
    animation-delay: 3s;
    filter: drop-shadow(0 0 8px rgba(196,255,0,.4));
  }
  @keyframes drawMoney {
    0%, 33.3% { stroke-dashoffset: 1100; }
    55.5%, 88% { stroke-dashoffset: 0; }
    96%, 100% { stroke-dashoffset: -1100; }
  }

  /* mouth line — down and to the right */
  .line-mouth {
    fill: none;
    stroke: var(--white);
    stroke-width: 5;
    stroke-linecap: square;
    stroke-linejoin: miter;
    stroke-dasharray: 1100;
    stroke-dashoffset: 1100;
    animation: drawMouth 9s cubic-bezier(.4,0,.2,1) infinite;
    animation-delay: 3s;
    opacity: .85;
  }
  @keyframes drawMouth {
    0%, 33.3% { stroke-dashoffset: 1100; }
    55.5%, 88% { stroke-dashoffset: 0; }
    96%, 100% { stroke-dashoffset: -1100; }
  }

  /* end-point dots */
  .dot-money, .dot-mouth {
    opacity: 0;
    animation: dotIn 9s ease-out infinite;
    animation-delay: 5s;
  }
  @keyframes dotIn { 0%, 55.5% { opacity: 0; r: 0; } 61%, 88% { opacity: 1; r: 8; } 96%, 100% { opacity: 0; r: 0; } }

  /* data labels at ends */
  .label-money, .label-mouth {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    z-index: 5;
    padding: 3px 8px;
    border: 1px solid currentColor;
    background: rgba(5,5,7,.85);
    animation: labelIn 9s ease-out infinite;
    animation-delay: 5.2s;
  }
  .label-money { color: var(--lime); right: 32px; top: 372px; }
  .label-mouth { color: var(--white); right: 32px; bottom: 312px; }
  @keyframes labelIn { 0%, 57.7% { opacity: 0; transform: translateX(8px); } 64%, 88% { opacity: 1; transform: translateX(0); } 96%, 100% { opacity: 0; } }

  /* ====================== DIVERGENCE GAP ====================== */
  .gap {
    position: absolute;
    top: 360px;
    bottom: 260px;
    left: 50%;
    width: 0;
    background: rgba(255,0,110,.10);
    border-left: 2px solid var(--magenta);
    border-right: 2px solid var(--magenta);
    transform: translateX(-50%);
    opacity: 0;
    z-index: 2;
    box-shadow: 0 0 32px rgba(255,0,110,.4), inset 0 0 32px rgba(255,0,110,.15);
    animation: gapIn 9s cubic-bezier(.2,.7,.1,1) infinite;
    animation-delay: 5.5s;
  }
  @keyframes gapIn {
    0%, 61% { opacity: 0; width: 0; }
    72%, 88% { opacity: 1; width: 180px; }
    96%, 100% { opacity: 0; width: 240px; }
  }

  .gap-label {
    position: absolute;
    top: 380px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 7;
    padding: 10px 20px;
    background: var(--void);
    border: 1px solid var(--magenta);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.2em;
    color: var(--magenta);
    text-transform: uppercase;
    opacity: 0;
    box-shadow: 0 0 32px rgba(255,0,110,.5);
    animation: gapLabelIn 9s cubic-bezier(.2,.7,.1,1) infinite;
    animation-delay: 5.8s;
    white-space: nowrap;
  }
  .gap-label::before { content: ''; display:inline-block; width: 8px; height: 8px; background: var(--magenta); margin-right: 10px; vertical-align: middle; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
  @keyframes gapLabelIn {
    0%, 64% { opacity: 0; transform: translateX(-50%) scale(.92); }
    74%, 88% { opacity: 1; transform: translateX(-50%) scale(1); }
    96%, 100% { opacity: 0; transform: translateX(-50%) scale(1.05); }
  }

  /* small flanking divergence value detail */
  .gap-meta {
    position: absolute;
    top: 440px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 7;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    animation: metaIn 9s ease-out infinite;
    animation-delay: 6.0s;
  }
  @keyframes metaIn { 0%, 66% { opacity: 0; } 76%, 88% { opacity: 1; } 96%, 100% { opacity: 0; } }

  /* ====================== FINAL CTA BLOCK ====================== */
  .cta {
    position: absolute;
    bottom: 110px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 7;
    opacity: 0;
    animation: ctaIn 9s ease-out infinite;
    animation-delay: 6.5s;
  }
  @keyframes ctaIn {
    0%, 72.2% { opacity: 0; transform: translateY(12px); }
    80%, 88% { opacity: 1; transform: translateY(0); }
    96%, 100% { opacity: 0; }
  }

  .cta .wm {
    font-family: 'Anton', sans-serif;
    font-size: 88px;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1;
  }
  .cta .wm .accent { color: var(--lime); }
  .cta .tag {
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .cta .tag .lime { color: var(--lime); }

  /* corner mark */
  .mark-corner {
    position: absolute;
    top: 28px;
    left: 32px;
    width: 22px;
    height: 22px;
    z-index: 10;
  }
  .mark-corner svg { width: 100%; height: 100%; }

  /* 1080×1080 badge */
  .canvas-badge {
    position: absolute;
    bottom: 28px;
    right: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 4px 8px;
    border: 1px solid var(--border);
    background: rgba(5,5,7,.5);
    backdrop-filter: blur(6px);
    z-index: 10;
  }

  /* scan-line decoration sweep on label appear */
  .scan {
    position: absolute;
    top: 360px;
    left: 80px;
    right: 80px;
    height: 460px;
    pointer-events: none;
    z-index: 6;
    background: linear-gradient(to bottom, transparent 0%, rgba(196,255,0,.08) 50%, transparent 100%);
    transform: translateY(-100%);
    animation: scan 9s ease-out infinite;
    animation-delay: 3s;
  }
  @keyframes scan {
    0%, 33.3% { transform: translateY(-100%); }
    44%, 50% { transform: translateY(100%); }
    50.01%, 100% { transform: translateY(-100%); }
  }

  /* horizon time bar */
  .time-bar {
    position: absolute;
    bottom: 76px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: var(--border);
    z-index: 3;
    opacity: 0;
    animation: tbarIn 9s ease-out infinite;
    animation-delay: 2.5s;
  }
  @keyframes tbarIn { 0%, 27% { opacity: 0; } 33%, 88% { opacity: 1; } 96%, 100% { opacity: 0; } }
  .time-bar::before, .time-bar::after, .time-bar span {
    position: absolute; top: 8px; font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: .2em; text-transform: uppercase;
  }
  .time-bar::before { content: 'T-0'; left: 0; }
  .time-bar span { left: 50%; transform: translateX(-50%); }
  .time-bar::after { content: 'T+24H'; right: 0; }
</style>
</head>
<body>

<div class="stage">
  <div class="dotgrid"></div>

  <!-- chrome -->
  <div class="mark-corner">
    <svg viewBox="0 0 64 64"><path d="M20 10 L50 32 L20 54" fill="none" stroke="#C4FF00" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/></svg>
  </div>
  <div class="hud-badge">EDGE · DIVERGENCE FEED · LIVE</div>
  <div class="hud-tr">v1 · 0xA3F2</div>

  <!-- WORDS -->
  <div class="word money">
    <span class="inner">MONEY</span>
    <span class="sub">POLYMARKET · KALSHI</span>
  </div>
  <div class="word mouth">
    <span class="inner">MOUTH</span>
    <span class="sub">SOCIAL SENTIMENT</span>
  </div>

  <!-- CHARTS -->
  <div class="chart-area">
    <svg viewBox="0 0 920 460" preserveAspectRatio="none">
      <!-- baseline + midline -->
      <line class="axis" x1="0" y1="230" x2="920" y2="230" />
      <line class="axis" x1="0" y1="80"  x2="920" y2="80" stroke-dasharray="2 6" />
      <line class="axis" x1="0" y1="380" x2="920" y2="380" stroke-dasharray="2 6" />

      <!-- money line — diagonal up -->
      <path class="line-money" d="M0 380 L120 340 L240 280 L360 240 L480 180 L600 130 L720 90 L840 50 L920 30" />
      <!-- mouth line — diagonal down -->
      <path class="line-mouth" d="M0 80 L120 110 L240 150 L360 180 L480 220 L600 280 L720 340 L840 400 L920 430" />

      <!-- end dots -->
      <circle class="dot-money" cx="920" cy="30" r="8" fill="#C4FF00" />
      <circle class="dot-mouth" cx="920" cy="430" r="8" fill="#F5F5F0" />
    </svg>
  </div>

  <div class="label-money">+18.4% / 24H</div>
  <div class="label-mouth">-32% SENT</div>

  <!-- scan sweep -->
  <div class="scan"></div>

  <!-- divergence gap -->
  <div class="gap"></div>
  <div class="gap-label">EDGE 0.72</div>
  <div class="gap-meta">MONEY − MOUTH · MAX DIVERGENCE</div>

  <!-- time bar -->
  <div class="time-bar"><span>WINDOW 24H</span></div>

  <!-- CTA -->
  <div class="cta">
    <div class="wm">$<span class="accent">EDGE</span></div>
    <div class="tag">WATCH THE ACTION. <span class="lime">BEFORE YOU BET.</span></div>
  </div>

  <!-- 1080×1080 badge -->
  <div class="canvas-badge">1080 × 1080</div>

  <!-- grain on top -->
  <div class="grain"></div>
</div>

</body>
</html>
